{% load static %}

<!-- верхняя панель сайта -->
<header class="border-bottom lh-1 py-3">
  <div class="row flex-nowrap justify-content-between align-items-center">

    <!-- левая часть: логотип + название -->
    <div class="col-4 pt-1 d-flex align-items-center">

      <!-- логотип, ссылка на главную -->
      <a href="{% url 'blog:index' %}">
        <img src="{% static 'img/logo.png' %}" alt="MyPyHub logo" height="60">
      </a>

      <!-- текстовый логотип -->
      <a class="blog-header-logo text-body-emphasis text-decoration-none ms-3"
         href="{% url 'blog:index' %}">
        MyPyHub
      </a>
    </div>

    <!-- правая часть: навигация -->
    <div class="col-4 d-flex justify-content-end align-items-center gap-2">

      <!-- кнопки навигации -->
      <a class="btn btn-sm btn-outline-secondary" href="{% url 'blog:index' %}">
        Публикации
      </a>

      <a class="btn btn-sm btn-outline-secondary" href="{% url 'pages:about' %}">
        О пректе
      </a>

      <a class="btn btn-sm btn-outline-secondary" href="{% url 'pages:rules' %}">
        Правила
      </a>
    </div>
    
  </div>
</header>
